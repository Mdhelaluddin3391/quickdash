version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: ${DB_NAME:-quickdash_db}
      POSTGRES_USER: ${DB_USER:-quickdash_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quickdash_password}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  web:
    build: .
    command: >
      sh -c "python manage.py migrate && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://${DB_USER:-quickdash_user}:${DB_PASSWORD:-quickdash_password}@db:5432/${DB_NAME:-quickdash_db}
      REDIS_URL: redis://redis:6379
  worker:
    build: .
    command: >
      sh -c "celery -A config worker --loglevel=info"
    volumes:
      - .:/code
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://${DB_USER:-quickdash_user}:${DB_PASSWORD:-quickdash_password}@db:5432/${DB_NAME:-quickdash_db}
      REDIS_URL: redis://redis:6379
  beat:
    build: .
    command: >
      sh -c "celery -A config beat --loglevel=info"
    volumes:
      - .:/code
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgres://${DB_USER:-quickdash_user}:${DB_PASSWORD:-quickdash_password}@db:5432/${DB_NAME:-quickdash_db}
      REDIS_URL: redis://redis:6379
volumes:
  db_data:
  redis_data:
